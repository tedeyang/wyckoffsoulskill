name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest tests.test_installer tests.test_wyckoff_engine_v2 -v

      - name: Build release archive
        run: python -m installer.build_release --output-dir dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyckoff-vpa-package
          path: dist/wyckoff-vpa-*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build release archive
        run: python -m installer.build_release --output-dir dist

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wyckoff-vpa-*.zip
          generate_release_notes: true
